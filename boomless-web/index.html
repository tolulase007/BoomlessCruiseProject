<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boomless Cruise Simulation</title>
    <meta name="description" content="Interactive tool for visualizing Mach cutoff conditions in supersonic flight">
    <!-- Preconnect to font origins (Chrome/Edge use these for faster first byte) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Async font: media=print prevents Chrome/Edge from blocking first paint; onload switches to all -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    </noscript>
    <!-- Start loading app script immediately -->
    <link rel="modulepreload" href="/src/main.tsx" />
  </head>
  <body>
    <div id="root">
      <!-- Visible immediately before React; replaced when app mounts -->
      <div class="app-loading" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;font-family:system-ui,sans-serif;color:#64748b;font-size:0.875rem;">
        <div style="width:2rem;height:2rem;border:2px solid #0f172a;border-top-color:transparent;border-radius:9999px;animation:app-spin .7s linear infinite"></div>
        <span>Loading…</span>
      </div>
    </div>
    <style>@keyframes app-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
